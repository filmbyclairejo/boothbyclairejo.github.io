<!doctype html>

<html lang="en">


    <head>


        <!-- META -->
        <meta charset="utf-8">
        <meta name="robots" content="noodp">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

        <!-- PAGE TITLE -->
        <title>boothbyclairejo &mdash; gallery</title>

        <!-- FAVICON -->
        <link rel="shortcut icon" href="../assets/img/logo2.png">

        <!-- FONTS -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css?family=Bellefair&amp;display=swap&amp;subset=latin-ext" rel="stylesheet">

        <!-- STYLESHEETS -->
        <link rel="stylesheet" type="text/css" href="../assets/css/plugins.css">
        <link rel="stylesheet" type="text/css" href="../assets/css/main.css">

        <style>
            /* Pull the lede description up closer to the logo */
            .logo-link { display: block; margin-bottom: 0.5rem; }
            .booth-logo { width: 100%; max-width: 900px; margin: 0 auto !important; }
            .lede { margin-top: 0.5rem !important; }

            /* ===== Gallery grid ===== */
            .gallery-heading {
                font-family: 'Bellefair', serif;
                font-size: 2.6rem;
                font-weight: 400;
                margin: 3rem 0 2rem;
                text-align: center;
            }

            .photo-gallery {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1.2rem;
                max-width: 110rem;
                margin: 2rem auto 4rem;
                padding: 0 1rem;
                align-items: start;
            }

            .photo-gallery img {
                width: 100%;
                height: auto;
                display: block;
                margin: 0 !important;
                border: 1px solid #ddd;
                background: #fafafa;
            }

            @media (max-width: 700px) {
                .photo-gallery {
                    grid-template-columns: repeat(2, 1fr);
                    gap: .8rem;
                }
            }
        </style>


    </head>


    <body>


        <!-- PRELOADER -->
        <div class="preloader">
            <div class="bounce"></div>
        </div>
        <!-- /PRELOADER -->


        <!-- NAVIGATION BUTTON -->
        <div class="navigation-button">
            <ul class="nav-menu">
                <li><a href="../#packages">packages</a></li>
                <li><a href="../#inquiry">inquiry</a></li>
                <li><a href="./">gallery</a></li>
            </ul>
        </div>
        <!-- /NAVIGATION BUTTON -->


        <!-- CONTENT -->
        <div class="about">


            <!-- CONTAINER FLUID -->
            <div class="container-fluid">

                <a href="../" class="logo-link">
                    <img src="../assets/img/logo.png" class="img-responsive booth-logo" alt="boothbyclairejo logo">
                </a>

                <h2 class="gallery-heading">gallery</h2>

                <!-- PHOTO GALLERY -->
                <div class="photo-gallery">
                    <img src="../assets/img/photo1.jpg" alt="boothbyclairejo photo 1">
                    <img src="../assets/img/photo2.jpg" alt="boothbyclairejo photo 2">
                    <img src="../assets/img/photo4.jpg" alt="boothbyclairejo photo 4">
                    <img src="../assets/img/photo3.jpg" alt="boothbyclairejo photo 3">
                    <img src="../assets/img/photo5.jpg" alt="boothbyclairejo photo 5">
                    <img src="../assets/img/photo6.jpg" alt="boothbyclairejo photo 6">
                </div>
                <!-- /PHOTO GALLERY -->


            </div>
            <!-- /CONTAINER FLUID -->


        </div>
        <!-- /CONTENT -->


        <!-- FOOTER -->
        <div class="footer">
            <div class="footer-inner">
                <ul class="social-icons scroll-animated-from-right">
                    <li><a href="https://www.instagram.com/boothbyclairejo/"><i class="fa fa-instagram" aria-hidden="true"></i></a></li>
                </ul>
            </div>
        </div>
        <!-- /FOOTER -->


        <!-- SCRIPTS -->
        <script src="../assets/js/plugins.js" defer></script>
        <script src="../assets/js/main.js" defer></script>


    </body>


</html>
